version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: us-east-1
    ACCOUNT_ID: "205930609978"
    ECR_REPOSITORY: devops-pro-app
    TASKDEF_FILE: taskdef.json
    APPSPEC_FILE: appspec.yml

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - IMAGE_TAG=$CODEBUILD_RESOLVED_SOURCE_VERSION
      - IMAGE_URI=$ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com

  build:
    commands:
      - echo Building Docker image...
      - docker build -t $IMAGE_URI .
      - echo Docker image built as $IMAGE_URI

  post_build:
    commands:
      - echo Pushing Docker image to ECR...
      - docker push $IMAGE_URI
      - echo Updating taskdef.json with new image URI...
      - sed -i "s|IMAGE_URI_PLACEHOLDER|$IMAGE_URI|g" $TASKDEF_FILE
      - echo Build completed

artifacts:
  files:
    - appspec.yml
    - taskdef.json
